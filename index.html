<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex — Client Work</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #111010;
    --ink-mid: #3a3835;
    --ink-soft: #7a7672;
    --ink-muted: #b0ada9;
    --cream: #FAFAF8;
    --border: #e8e6e2;
    --accent: #C9954A;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 3rem 2rem 2rem;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  .wordmark span {
    color: var(--accent);
  }

  main {
    flex: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
    width: 100%;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 2rem;
  }

  .lock {
    font-size: 28px;
    margin-bottom: 1.5rem;
    opacity: 0.3;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }

  p {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.7;
    max-width: 340px;
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  footer {
    padding: 2rem;
    text-align: center;
    font-size: 12px;
    color: var(--ink-muted);
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">Alex<span>.</span></div>
</header>

<main>
  <div class="lock">⬡</div>
  <h1>Alex Projects</h1>
  <p>This page is private. If you're looking for something, please email <a href="mailto:alex@lifemasters.com">alex@lifemasters.com</a></p>
</main>

<footer>
  Private client portal
</footer>

</body>
</html>
